<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星指南 - 追星情報與記帳小幫手</title>
    
    <script>
        const savedMode = localStorage.getItem('starGuideMode');
        if (savedMode === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',      
                        card: '#1c1c1e',      
                        cardHover: '#2c2c2e', 
                        themePrimary: 'rgb(var(--theme-primary) / <alpha-value>)',
                        themeSecondary: 'rgb(var(--theme-secondary) / <alpha-value>)',
                        themeText: 'rgb(var(--theme-text) / <alpha-value>)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --theme-primary: 168 85 247;   
            --theme-secondary: 236 72 153; 
            --theme-text: 216 180 254;     
        }
        [data-theme="carat"] {
            --theme-primary: 146 168 209;  
            --theme-secondary: 247 202 201;
            --theme-text: 193 204 224;
        }
        [data-theme="aqua"] {
            --theme-primary: 66 194 168;   
            --theme-secondary: 121 229 203;
            --theme-text: 168 238 221;     
        }
        [data-theme="neo"] {
            --theme-primary: 139 166 41;   
            --theme-secondary: 181 212 60; 
            --theme-text: 210 235 115;     
        }
        select, input[type="color"] { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1em;
        }
        input[type="color"] { border: none; width: 100%; height: 36px; border-radius: 8px; cursor: pointer; background: transparent; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        * { transition: background-color 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark text-gray-900 dark:text-gray-100 font-sans antialiased selection:bg-themePrimary/30 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen bg-slate-50 dark:bg-dark shadow-2xl flex flex-col relative overflow-hidden transition-colors duration-300">
        
        <header class="pt-10 px-6 pb-4">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold tracking-wide text-gray-900 dark:text-white">✨ 星指南</h1>
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" class="w-8 h-8 rounded-full bg-white dark:bg-cardHover border border-gray-200 dark:border-white/10 shadow-sm flex items-center justify-center active:scale-95 transform transition">
                        <span id="modeIcon" class="text-[13px] leading-none">☀️</span>
                    </button>
                    <button onclick="openThemeModal()" class="w-8 h-8 rounded-full bg-gradient-to-tr from-themePrimary to-themeSecondary p-[2px] shadow-lg shadow-themePrimary/20 active:scale-95 transform transition">
                        <div class="bg-slate-50 dark:bg-dark w-full h-full rounded-full flex items-center justify-center">
                            <span class="text-xs">🎨</span>
                        </div>
                    </button>
                </div>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400">追星情報與記帳小幫手</p>
        </header>

        <div class="flex px-6 space-x-3 mb-6">
            <button id="btnA" onclick="switchTab('A')" class="flex-1 py-2.5 rounded-2xl bg-gradient-to-r from-themePrimary/20 to-themeSecondary/20 text-themePrimary dark:text-themeText border border-themePrimary/30 font-semibold text-sm shadow-sm">
                情報摘要
            </button>
            <button id="btnB" onclick="switchTab('B')" class="flex-1 py-2.5 rounded-2xl text-gray-500 dark:text-gray-400 border border-transparent font-semibold text-sm hover:bg-gray-200/50 dark:hover:bg-white/5">
                愛意帳本
            </button>
        </div>

        <main class="flex-1 px-6 pb-10 overflow-y-auto">

            <!-- 🔶 Tab A：情報摘要 🔶 -->
            <div id="tabA" class="space-y-6 block">
                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-end px-1">
                        <span class="text-xs font-bold text-gray-500">✨ AI 智慧情報摘要 (支援網址或貼文文字)</span>
                    </div>
                    <textarea id="infoInput" rows="3" placeholder="請貼上網址 (YouTube, X, Weverse...) 或直接貼上公告文字..." class="w-full bg-white dark:bg-card border border-gray-300 dark:border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-themePrimary text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 shadow-sm dark:shadow-none resize-none"></textarea>
                    
                    <button id="aiBtn" onclick="generateRealAISummary()" class="w-full py-3 bg-gradient-to-r from-themePrimary to-themeSecondary text-white rounded-2xl text-sm font-bold shadow-lg shadow-themePrimary/20 active:scale-95 transform transition">
                        🤖 開始 AI 解析
                    </button>
                </div>

                <div id="summaryCard" class="hidden bg-white dark:bg-card rounded-[28px] p-6 border border-gray-100 dark:border-white/5 shadow-xl shadow-gray-200/50 dark:shadow-none relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-themePrimary/10 blur-2xl rounded-full pointer-events-none"></div>
                    
                    <div id="aiPlatformTag" class="inline-block px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 text-cyan-600 dark:text-cyan-400 text-xs rounded-full font-medium tracking-wide mb-4">
                        分析結果
                    </div>
                    
                    <div id="aiContentArea" class="text-sm text-gray-700 dark:text-gray-200 leading-relaxed space-y-2 mb-5"></div>
                    
                    <div id="aiReminderArea" class="bg-slate-50 dark:bg-cardHover rounded-2xl p-4 border border-gray-100 dark:border-white/5 mb-5">
                        <div class="flex items-center gap-2 text-themeSecondary text-sm font-bold mb-2"><span>🚨</span> 重要時間點</div>
                        <div id="aiTimeList" class="text-xs text-gray-500 dark:text-gray-400 space-y-1.5 font-mono"></div>
                    </div>
                    
                    <button id="aiConvertBtn" class="w-full py-3.5 bg-gray-50 dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10 rounded-2xl text-sm font-semibold text-themePrimary dark:text-themeText active:scale-95 transform transition">
                        ➕ 轉為追星預算/支出
                    </button>
                </div>
            </div>

            <!-- 🔶 Tab B：愛意帳本 🔶 -->
            <div id="tabB" class="space-y-6 hidden">
                <div class="bg-white dark:bg-card rounded-[28px] p-6 border border-gray-100 dark:border-white/5 shadow-xl shadow-gray-200/50 dark:shadow-none">
                    <div class="flex justify-between items-end mb-3">
                        <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">本月愛意預算</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">剩餘 <span class="text-transparent bg-clip-text bg-gradient-to-r from-themePrimary to-themeSecondary font-black text-xl ml-1" id="budgetRemaining">$0</span></span>
                    </div>
                    <div class="w-full bg-gray-100 dark:bg-cardHover rounded-full h-2 mb-3 overflow-hidden shadow-inner">
                        <div id="progressBar" class="bg-gradient-to-r from-themePrimary to-themeSecondary h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-end items-center gap-1.5 text-right text-xs text-gray-500 font-medium">
                        已用 <span id="spentText">$0</span> / 總預算 <span id="totalBudgetText">$5,000</span>
                        <button onclick="editBudget()" class="text-gray-400 hover:text-themePrimary active:scale-90 transition p-1" title="設定總預算">✏️</button>
                    </div>
                </div>

                <div class="bg-white dark:bg-card rounded-[28px] p-6 border border-gray-100 dark:border-white/5 shadow-xl shadow-gray-200/50 dark:shadow-none space-y-4">
                    <div class="grid grid-cols-[1fr_100px] gap-3">
                        <input type="number" id="expenseAmount" placeholder="$ 金額" class="bg-gray-50 dark:bg-cardHover rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-themePrimary border border-gray-200 dark:border-transparent font-medium text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500">
                        <select id="expenseCategory" class="bg-gray-50 dark:bg-cardHover rounded-2xl px-4 py-3 text-sm focus:outline-none border border-gray-200 dark:border-transparent text-gray-700 dark:text-gray-300 font-medium">
                            <option>門票</option>
                            <option>專輯</option>
                            <option>周邊</option>
                            <option>應援</option>
                        </select>
                    </div>
                    <input type="text" id="expenseItem" placeholder="品項名稱 (例：巡迴首爾場門票)" class="w-full bg-gray-50 dark:bg-cardHover rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-themePrimary border border-gray-200 dark:border-transparent text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-500">
                    <button onclick="addExpense()" class="w-full py-3.5 bg-gray-800 dark:bg-gray-100 hover:bg-gray-900 dark:hover:bg-white text-white dark:text-dark font-bold rounded-2xl text-sm shadow-lg active:scale-95 transform transition">
                        記一筆
                    </button>
                </div>

                <div class="space-y-3 pt-2">
                    <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 ml-2 tracking-wider mb-3">近期明細</h3>
                    <div id="expenseList" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 主題選擇 Modal -->
    <div id="themeModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white dark:bg-card w-[85%] max-w-sm rounded-[28px] p-6 border border-gray-200 dark:border-white/10 shadow-2xl transform scale-95 transition-transform duration-300 max-h-[90vh] overflow-y-auto" id="themeModalContent">
            <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100 mb-5 flex justify-between items-center">
                <span>🎨 選擇應援主題色</span>
                <button onclick="closeThemeModal()" class="text-gray-400 hover:text-gray-700 dark:text-gray-500 dark:hover:text-white transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/10">✖</button>
            </h3>
            
            <div class="space-y-3 mb-5">
                <button onclick="setTheme('default')" class="w-full flex items-center gap-3 p-3 rounded-2xl bg-gray-50 dark:bg-cardHover border border-transparent hover:border-gray-200 dark:hover:border-white/20 active:scale-95 transition">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-[#a855f7] to-[#ec4899]"></div>
                    <span class="text-gray-800 dark:text-gray-200 font-medium">星空紫粉 (預設)</span>
                </button>
                <button onclick="setTheme('carat')" class="w-full flex items-center gap-3 p-3 rounded-2xl bg-gray-50 dark:bg-cardHover border border-transparent hover:border-gray-200 dark:hover:border-white/20 active:scale-95 transition">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-[#92a8d1] to-[#f7cac9]"></div>
                    <span class="text-gray-800 dark:text-gray-200 font-medium">石英粉與寧靜藍</span>
                </button>
                <button onclick="setTheme('aqua')" class="w-full flex items-center gap-3 p-3 rounded-2xl bg-gray-50 dark:bg-cardHover border border-transparent hover:border-gray-200 dark:hover:border-white/20 active:scale-95 transition">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-[#42c2a8] to-[#79e5cb]"></div>
                    <span class="text-gray-800 dark:text-gray-200 font-medium">閃耀湖水綠</span>
                </button>
                <button onclick="setTheme('neo')" class="w-full flex items-center gap-3 p-3 rounded-2xl bg-gray-50 dark:bg-cardHover border border-transparent hover:border-gray-200 dark:hover:border-white/20 active:scale-95 transition">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-[#8ba629] to-[#b5d43c]"></div>
                    <span class="text-gray-800 dark:text-gray-200 font-medium">新綠香檳</span>
                </button>
            </div>

            <hr class="border-gray-100 dark:border-white/5 mb-5">
            <h4 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-3 ml-1">✨ 自訂專屬色彩</h4>
            <div class="bg-gray-50 dark:bg-cardHover p-4 rounded-2xl border border-gray-100 dark:border-white/5 space-y-4">
                <div class="flex gap-4">
                    <div class="flex flex-col gap-1.5 flex-1">
                        <label class="text-[11px] text-gray-500 dark:text-gray-400 tracking-wide font-medium">主色調</label>
                        <input type="color" id="customPrimary" value="#a855f7">
                    </div>
                    <div class="flex flex-col gap-1.5 flex-1">
                        <label class="text-[11px] text-gray-500 dark:text-gray-400 tracking-wide font-medium">副色調 (漸層)</label>
                        <input type="color" id="customSecondary" value="#ec4899">
                    </div>
                </div>
                <button onclick="applyCustomThemeFromInput()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 dark:bg-white/10 dark:hover:bg-white/20 text-gray-800 dark:text-white rounded-xl text-sm font-semibold transition active:scale-95">
                    套用自訂色彩
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript ==================== -->
    <script>
        let expenses = [];
        let TOTAL_BUDGET = 5000; 

        window.onload = function() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('modeIcon').innerText = isDark ? '☀️' : '🌙';
            loadData();
            renderExpenses();
            updateBudget();
        };

        async function generateRealAISummary() {
            const input = document.getElementById('infoInput').value;
            const btn = document.getElementById('aiBtn');
            const card = document.getElementById('summaryCard');

            if (!input.trim()) {
                alert('⚠️ 請輸入網址或貼上情報文字內容喔！');
                return;
            }

            btn.innerText = '🤖 AI 正在解析網址與內容... ⏳';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            card.classList.add('hidden');

            try {
                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: input })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message || '後端伺服器發生錯誤');
                }

                let textRes = data.candidates[0].content.parts[0].text;
                textRes = textRes.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const aiData = JSON.parse(textRes);

                document.getElementById('aiPlatformTag').innerText = aiData.platform || '情報更新';
                
                const pointsHtml = (aiData.points || []).map(p => 
                    `<p class="flex items-start"><span class="mr-2 text-themePrimary">•</span> ${p}</p>`
                ).join('');
                document.getElementById('aiContentArea').innerHTML = pointsHtml;

                const remindersHtml = (aiData.reminders || []).map(r => 
                    `<p class="flex justify-between"><span>${r.label}</span> <span class="text-gray-800 dark:text-gray-200">${r.time}</span></p>`
                ).join('');
                document.getElementById('aiTimeList').innerHTML = remindersHtml || '<p class="text-gray-400">目前無時間資訊</p>';

                const btnEl = document.getElementById('aiConvertBtn');
                btnEl.innerText = `➕ 轉為追星預算/支出 ($${aiData.expenseAmount.toLocaleString()})`;
                
                btnEl.onclick = function() {
                    autoFillExpense(aiData.expenseAmount, aiData.expenseCategory, aiData.expenseItem);
                };

                card.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert('❌ 解析失敗，部分平台（如 IG、X）若有登入牆限制，建議直接複製貼上文字內容最準確！\n錯誤: ' + error.message);
            } finally {
                btn.innerText = '🤖 開始 AI 解析';
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function autoFillExpense(amount, category, item) {
            switchTab('B');
            document.getElementById('expenseAmount').value = amount;
            document.getElementById('expenseCategory').value = category;
            document.getElementById('expenseItem').value = item;
            
            setTimeout(() => {
                alert(`✅ AI 已幫您將「${item}」帶入記帳本！`);
            }, 300);
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('modeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('starGuideMode', 'light');
                icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('starGuideMode', 'dark');
                icon.innerText = '☀️';
            }
        }

        function loadData() {
            const savedTheme = localStorage.getItem('starGuideTheme') || 'default';
            if (savedTheme === 'custom') {
                const p = localStorage.getItem('starGuideCustomPrimary');
                const s = localStorage.getItem('starGuideCustomSecondary');
                if (p && s) applyCustomTheme(p, s, true);
                else setTheme('default', true);
            } else {
                setTheme(savedTheme, true);
            }

            const savedData = localStorage.getItem('starGuideExpenses');
            if (savedData) expenses = JSON.parse(savedData);
            else {
                expenses = [{ id: Date.now(), item: '迷你五輯 SET', category: '專輯', amount: 1250, date: '2026/07/15', status: '已收到' }];
                saveData();
            }

            const savedBudget = localStorage.getItem('starGuideBudget');
            if (savedBudget) TOTAL_BUDGET = Number(savedBudget);
        }

        function openThemeModal() {
            const modal = document.getElementById('themeModal');
            const content = document.getElementById('themeModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeThemeModal() {
            const modal = document.getElementById('themeModal');
            const content = document.getElementById('themeModalContent');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300); 
        }

        function setTheme(themeName, isInit = false) {
            document.documentElement.style.removeProperty('--theme-primary');
            document.documentElement.style.removeProperty('--theme-secondary');
            document.documentElement.style.removeProperty('--theme-text');
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('starGuideTheme', themeName);
            if (!isInit) closeThemeModal();
        }

        function hexToRgbString(hex) {
            let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, function(m, r, g, b) { return r + r + g + g + b + b; });
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)} ${parseInt(result[2], 16)} ${parseInt(result[3], 16)}` : null;
        }

        function applyCustomThemeFromInput() {
            const p = document.getElementById('customPrimary').value;
            const s = document.getElementById('customSecondary').value;
            applyCustomTheme(p, s, false);
        }

        function applyCustomTheme(primaryHex, secondaryHex, isInit = false) {
            const pRgb = hexToRgbString(primaryHex);
            const sRgb = hexToRgbString(secondaryHex);
            if(!pRgb || !sRgb) return;
            document.documentElement.setAttribute('data-theme', 'custom');
            document.documentElement.style.setProperty('--theme-primary', pRgb);
            document.documentElement.style.setProperty('--theme-secondary', sRgb);
            document.documentElement.style.setProperty('--theme-text', pRgb); 
            localStorage.setItem('starGuideTheme', 'custom');
            localStorage.setItem('starGuideCustomPrimary', primaryHex);
            localStorage.setItem('starGuideCustomSecondary', secondaryHex);
            document.getElementById('customPrimary').value = primaryHex;
            document.getElementById('customSecondary').value = secondaryHex;
            if (!isInit) closeThemeModal();
        }

        function saveData() { localStorage.setItem('starGuideExpenses', JSON.stringify(expenses)); }
        function saveBudget() { localStorage.setItem('starGuideBudget', TOTAL_BUDGET); }

        function updateBudget() {
            const totalSpent = expenses.reduce((sum, current) => sum + current.amount, 0);
            const remaining = TOTAL_BUDGET - totalSpent;
            let percentage = (totalSpent / TOTAL_BUDGET) * 100;
            if (percentage > 100) percentage = 100;

            document.getElementById('budgetRemaining').innerText = `$${remaining.toLocaleString()}`;
            document.getElementById('spentText').innerText = `$${totalSpent.toLocaleString()}`;
            document.getElementById('totalBudgetText').innerText = `$${TOTAL_BUDGET.toLocaleString()}`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
            
            if (remaining < 0) {
                document.getElementById('budgetRemaining').classList.remove('from-themePrimary', 'to-themeSecondary');
                document.getElementById('budgetRemaining').classList.add('from-red-500', 'to-red-600', 'dark:from-red-400', 'dark:to-red-500');
            } else {
                document.getElementById('budgetRemaining').classList.add('from-themePrimary', 'to-themeSecondary');
                document.getElementById('budgetRemaining').classList.remove('from-red-500', 'to-red-600', 'dark:from-red-400', 'dark:to-red-500');
            }
        }

        function editBudget() {
            const input = prompt('請輸入本月的追星總預算：', TOTAL_BUDGET);
            if (input !== null && input.trim() !== '' && !isNaN(input)) {
                const newBudget = parseInt(input, 10);
                if (newBudget >= 0) {
                    TOTAL_BUDGET = newBudget;
                    saveBudget();    
                    updateBudget();  
                } else {
                    alert('⚠️ 預算不能為負數喔！');
                }
            }
        }

        function renderExpenses() {
            const listContainer = document.getElementById('expenseList');
            listContainer.innerHTML = ''; 

            if (expenses.length === 0) {
                listContainer.innerHTML = '<p class="text-sm text-gray-400 dark:text-gray-500 text-center py-4">目前還沒有任何花費喔！</p>';
                return;
            }

            const reversedExpenses = [...expenses].reverse();

            reversedExpenses.forEach(exp => {
                const statusHtml = exp.status === '未到貨' 
                    ? `<span onclick="toggleStatus(${exp.id})" class="cursor-pointer hover:opacity-80 active:scale-95 transition-all text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/20 dark:bg-yellow-500/10 text-yellow-600 dark:text-yellow-400 border border-yellow-500/30 dark:border-yellow-500/20 font-bold select-none">未到貨</span>`
                    : `<span onclick="toggleStatus(${exp.id})" class="cursor-pointer hover:opacity-80 active:scale-95 transition-all text-[10px] px-2 py-0.5 rounded-full bg-green-500/20 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-500/30 dark:border-green-500/20 font-bold select-none">已收到</span>`;

                const itemHtml = `
                    <div class="flex items-center justify-between bg-white dark:bg-card p-4 rounded-2xl border border-gray-100 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-cardHover transition cursor-default shadow-sm dark:shadow-none">
                        <div class="flex flex-col gap-1.5">
                            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200">${exp.item}</span>
                            <span class="text-xs text-gray-500 font-medium">${exp.category} • ${exp.date}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col items-end gap-1.5">
                                <span class="font-bold text-gray-800 dark:text-gray-200 tracking-wide">-$${exp.amount.toLocaleString()}</span>
                                ${statusHtml}
                            </div>
                            <button onclick="deleteExpense(${exp.id})" class="text-gray-400 hover:text-red-500 dark:text-gray-600 dark:hover:text-red-400 active:scale-90 transition p-1" title="刪除此筆花費">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function toggleStatus(id) {
            const index = expenses.findIndex(exp => exp.id === id);
            if (index !== -1) {
                expenses[index].status = expenses[index].status === '未到貨' ? '已收到' : '未到貨';
                saveData();
                renderExpenses();
            }
        }

        function addExpense() {
            const amountInput = document.getElementById('expenseAmount').value;
            const category = document.getElementById('expenseCategory').value;
            const item = document.getElementById('expenseItem').value;

            if (!amountInput || !item) {
                alert('⚠️ 請輸入「金額」與「品項名稱」喔！');
                return;
            }

            const today = new Date();
            const dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

            const newExpense = {
                id: Date.now(), 
                item: item,
                category: category,
                amount: Number(amountInput),
                date: dateStr,
                status: '未到貨' 
            };

            expenses.push(newExpense);
            saveData();       
            renderExpenses(); 
            updateBudget();   

            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseItem').value = '';
        }

        function deleteExpense(id) {
            if (confirm('確定要刪除這筆花費嗎？')) {
                expenses = expenses.filter(exp => exp.id !== id);
                saveData();
                renderExpenses();
                updateBudget();
            }
        }

        function switchTab(tab) {
            const tabA = document.getElementById('tabA');
            const tabB = document.getElementById('tabB');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');
            
            const activeClasses = "bg-gradient-to-r from-themePrimary/20 to-themeSecondary/20 text-themePrimary dark:text-themeText border border-themePrimary/30".split(" ");
            const inactiveClasses = "text-gray-500 dark:text-gray-400 border-transparent hover:bg-gray-200/50 dark:hover:bg-white/5".split(" ");

            if (tab === 'A') {
                tabA.classList.remove('hidden'); tabA.classList.add('block');
                tabB.classList.add('hidden'); tabB.classList.remove('block');
                btnA.classList.add(...activeClasses); btnA.classList.remove(...inactiveClasses);
                btnB.classList.remove(...activeClasses); btnB.classList.add(...inactiveClasses);
            } else {
                tabB.classList.remove('hidden'); tabB.classList.add('block');
                tabA.classList.add('hidden'); tabA.classList.remove('block');
                btnB.classList.add(...activeClasses); btnB.classList.remove(...inactiveClasses);
                btnA.classList.remove(...activeClasses); btnA.classList.add(...inactiveClasses);
            }
        }
    </script>
</body>
</html>
